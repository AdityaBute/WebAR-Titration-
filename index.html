<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Titration Final Project</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <script>
      AFRAME.registerComponent('sticky-ar', {
        init: function () {
          this.isUnlocked = false;
          this.el.addEventListener('targetFound', () => {
            if (!this.isUnlocked) {
              this.isUnlocked = true;
              const debugUI = document.querySelector('#debug-ui');
              debugUI.style.display = 'block';
              debugUI.innerText = "Model Unlocked! You can remove the paper.";
              setTimeout(() => { debugUI.style.display = 'none'; }, 3000);
            }
          });
        },
        tick: function () {
          // If it has been scanned once, never let MindAR hide it again
          if (this.isUnlocked) {
            this.el.object3D.visible = true;
          }
        }
      });
    </script>

    <script>
      AFRAME.registerComponent('custom-controls', {
        schema: { 
          rotationSpeed: { default: 1 },
          minScale: { default: 0.2 },
          maxScale: { default: 4 }
        },
        init: function () {
          this.isDragging = false;
          this.x_cord = 0;
          this.y_cord = 0;
          this.initialDist = 0;
          this.startScale = this.el.object3D.scale.clone();

          document.addEventListener('touchstart', this.onTouchStart.bind(this));
          document.addEventListener('touchend', this.onTouchEnd.bind(this));
          document.addEventListener('touchmove', this.onTouchMove.bind(this));
        },
        onTouchStart: function (e) {
          if (e.touches.length === 1) {
            this.isDragging = true;
            this.x_cord = e.touches[0].clientX;
            this.y_cord = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            this.isDragging = false;
            this.initialDist = this.getDist(e.touches);
            this.startScale = this.el.object3D.scale.clone();
          }
        },
        onTouchEnd: function () { 
          this.isDragging = false; 
        },
        onTouchMove: function (e) {
          // Rotate (1 Finger)
          if (this.isDragging && e.touches.length === 1) {
            let temp_x = e.touches[0].clientX - this.x_cord;
            let temp_y = e.touches[0].clientY - this.y_cord;
            this.el.object3D.rotation.y += temp_x * this.data.rotationSpeed / 100;
            this.el.object3D.rotation.x += temp_y * this.data.rotationSpeed / 100;
            this.x_cord = e.touches[0].clientX;
            this.y_cord = e.touches[0].clientY;
          } 
          // Zoom (2 Fingers)
          else if (e.touches.length === 2) {
            if (this.initialDist === 0) return;
            let currentDist = this.getDist(e.touches);
            let factor = currentDist / this.initialDist;
            
            let nx = this.startScale.x * factor;
            let ny = this.startScale.y * factor;
            let nz = this.startScale.z * factor;
            
            nx = Math.max(this.data.minScale, Math.min(this.data.maxScale, nx));
            ny = Math.max(this.data.minScale, Math.min(this.data.maxScale, ny));
            nz = Math.max(this.data.minScale, Math.min(this.data.maxScale, nz));
            
            this.el.object3D.scale.set(nx, ny, nz);
          }
        },
        getDist: function(touches) {
          let dx = touches[0].clientX - touches[1].clientX;
          let dy = touches[0].clientY - touches[1].clientY;
          return Math.sqrt(dx*dx + dy*dy);
        }
      });
    </script>
    
    <style>
      .mindar-ui-overlay { pointer-events: none; }
      #debug-ui {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: lime; padding: 10px 20px; border-radius: 8px;
        font-family: monospace; font-size: 16px; z-index: 9999; display: none; pointer-events: none; text-align: center;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div id="debug-ui">System Ready</div>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true, antialias: true, sortObjects: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="lab-kit" src="./assets/titration_final.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity light="type: ambient; intensity: 1.2; color: #ffffff;"></a-entity>
      <a-entity light="type: directional; intensity: 1.5; color: #ffffff;" position="1 2 1"></a-entity>
      <a-entity light="type: directional; intensity: 0.5; color: #e0f7fa;" position="-1 0.5 -1"></a-entity>

      <a-entity id="image-target" mindar-image-target="targetIndex: 0" sticky-ar>
        
        <a-entity id="model-wrapper" custom-controls>
            <a-gltf-model id="titration-setup" 
                          src="#lab-kit" 
                          scale="0.5 0.5 0.5" 
                          position="0 -0.5 0">
            </a-gltf-model>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      const setup = document.querySelector('#titration-setup');
      const debugUI = document.querySelector('#debug-ui');
      let dropCount = 0;
      let isAnimating = false;

      function showDebug(msg) {
          debugUI.style.display = 'block';
          debugUI.innerText = msg;
          setTimeout(() => { debugUI.style.display = 'none'; }, 2000);
      }

      // SHADER FIXES
      setup.addEventListener('model-loaded', () => {
         const mesh = setup.getObject3D('mesh');
         if (mesh) {
             mesh.traverse((node) => {
                 if (node.isMesh && node.material) {
                     if (node.name.includes('Liquid') || node.name.includes('Sphere')) {
                         node.material.transparent = false;
                         node.material.opacity = 1.0;
                         node.material.depthWrite = true;
                         node.material.renderOrder = 1;
                         if (node.material.transmission !== undefined) node.material.transmission = 0;
                         node.material.needsUpdate = true; 
                     }
                     else if (node.material.transparent || node.material.opacity < 1.0) {
                         node.material.depthWrite = false;
                         node.material.renderOrder = 2;
                         node.material.needsUpdate = true;
                     }
                 }
             });
             const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
             if (pinkLiquid) pinkLiquid.visible = false; 
         }
      });

      // TAP TO ANIMATE
      window.addEventListener('click', () => {
        // Wait until unlocked, and prevent spamming
        const targetEntity = document.querySelector('#image-target').components['sticky-ar'];
        if (isAnimating || !targetEntity || !targetEntity.isUnlocked) return; 
        
        dropCount++;
        isAnimating = true;

        setup.removeAttribute('animation-mixer');
        setTimeout(() => {
            setup.setAttribute('animation-mixer', 'clip: *; loop: once; crossFadeDuration: 0;');
        }, 10);

        const onAnimationFinish = function() {
          setup.removeEventListener('animation-finished', onAnimationFinish);
          isAnimating = false; 

          if (dropCount === 7) {
            const mesh = setup.getObject3D('mesh');
            if (mesh) {
                const clearLiquid = mesh.getObjectByName('Liquid_Clear');
                const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
                if (clearLiquid) clearLiquid.visible = false; 
                if (pinkLiquid) pinkLiquid.visible = true;    
            }
            
            const alertBox = document.createElement('div');
            alertBox.innerHTML = "Equivalence Point Reached!";
            alertBox.style.cssText = "position:absolute; top:20%; left:50%; transform:translateX(-50%); background:white; padding:15px; border-radius:10px; font-family:sans-serif; font-weight:bold; color:#FF1493; z-index:9999; box-shadow: 0px 4px 6px rgba(0,0,0,0.4); text-align: center;";
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.remove(), 4000);
          }
        };

        setup.addEventListener('animation-finished', onAnimationFinish);
        
        setTimeout(() => {
            if(isAnimating) {
                isAnimating = false;
                setup.removeEventListener('animation-finished', onAnimationFinish);
            }
        }, 1500); 
      });
    </script>
  </body>
</html>
