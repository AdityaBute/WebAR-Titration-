<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Titration Experience</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; }
      .mindar-ui-overlay { pointer-events: none; }
      
      /* The Main Menu Overlay */
      #ar-menu {
        position: absolute;
        bottom: -100%; /* Starts hidden off-screen */
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 400px;
        background: rgba(20, 20, 25, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 24px 24px 0 0;
        padding: 30px 20px 40px 20px;
        box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        z-index: 9999;
        transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        text-align: center;
        pointer-events: auto;
      }

      #ar-menu.visible { bottom: 0; } /* Slides up smoothly */

      #ar-menu h2 { color: #ffffff; margin: 0 0 5px 0; font-size: 24px; font-weight: 600; }
      #ar-menu p { color: #aaaaaa; margin: 0 0 25px 0; font-size: 14px; }

      /* The Menu Buttons */
      .menu-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 18px;
        margin-bottom: 15px;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .menu-btn:hover, .menu-btn:active {
        background: rgba(255, 20, 147, 0.3); /* Pink glow on tap */
        border-color: rgba(255, 20, 147, 0.6);
        transform: scale(0.98);
      }

      .menu-btn .icon { font-size: 24px; margin-right: 12px; }

      /* The Back Button (Floats top left) */
      #back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        color: white;
        border: 1px solid rgba(255,255,255,0.2);
        padding: 10px 15px;
        border-radius: 30px;
        font-weight: bold;
        z-index: 9999;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      #back-btn.visible { opacity: 1; pointer-events: auto; }
      
      /* Success Popup */
      #success-popup {
        position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
        background: white; padding: 15px 25px; border-radius: 30px;
        font-family: sans-serif; font-weight: bold; color: #FF1493;
        z-index: 9999; box-shadow: 0px 8px 15px rgba(0,0,0,0.3);
        opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
      }
      #success-popup.visible { opacity: 1; }

    </style>
  </head>

  <body>

    <button id="back-btn">← Menu</button>
    <div id="success-popup">Equivalence Point Reached!</div>
    
    <div id="ar-menu">
      <h2>Titration Lab</h2>
      <p>Target Scanned! Choose your experience.</p>
      
      <button class="menu-btn" id="btn-3d">
        <span class="icon">🧪</span> Interactive 3D Model
      </button>
      
      <button class="menu-btn" id="btn-video">
        <span class="icon">▶️</span> Watch Explanation Video
      </button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true, antialias: true, sortObjects: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="lab-kit" src="./assets/titration_final.glb"></a-asset-item>
        <video id="titration-vid" src="./assets/titration_video.mp4" preload="auto" crossorigin="anonymous" loop="true" playsinline webkit-playsinline></video>
      </a-assets>

      <a-entity light="type: ambient; intensity: 1.2; color: #ffffff;"></a-entity>
      <a-entity light="type: directional; intensity: 1.5; color: #ffffff;" position="1 2 1"></a-entity>
      <a-entity light="type: directional; intensity: 0.5; color: #e0f7fa;" position="-1 0.5 -1"></a-entity>

      <a-camera id="ar-camera" position="0 0 0" look-controls="enabled: false">
          <a-entity id="hud-model" visible="false" position="0 -0.5 -3">
              <a-gltf-model class="titration-setup" src="#lab-kit" scale="0.5 0.5 0.5" position="0 0 0"></a-gltf-model>
          </a-entity>
      </a-camera>

      <a-entity id="image-target" mindar-image-target="targetIndex: 0">
          
          <a-entity id="target-model" visible="false" position="0 -0.5 0">
              <a-gltf-model class="titration-setup" src="#lab-kit" scale="0.5 0.5 0.5" position="0 0 0"></a-gltf-model>
          </a-entity>

          <a-video id="ar-video" src="#titration-vid" position="0 0 0" scale="1 0.56 1" visible="false"></a-video>
          
      </a-entity>

    </a-scene>

    <script>
      // DOM Elements
      const arMenu = document.getElementById('ar-menu');
      const backBtn = document.getElementById('back-btn');
      const popup = document.getElementById('success-popup');
      
      const btn3D = document.getElementById('btn-3d');
      const btnVideo = document.getElementById('btn-video');
      
      const targetEntity = document.querySelector('#image-target');
      const hudWrapper = document.querySelector('#hud-model');
      const targetWrapper = document.querySelector('#target-model');
      const arVideo = document.querySelector('#ar-video');
      const vidAsset = document.querySelector('#titration-vid');
      const models = document.querySelectorAll('.titration-setup');

      // State Variables
      let activeExperience = null; // null, '3d', or 'video'
      let isTargetVisible = false;
      let dropCount = 0;
      let isAnimating = false;

      // 1. SHADER FIXES (Keeps Pink Liquid Solid)
      models.forEach(setup => {
          setup.addEventListener('model-loaded', () => {
             const mesh = setup.getObject3D('mesh');
             if (mesh) {
                 mesh.traverse((node) => {
                     if (node.isMesh && node.material) {
                         if (node.name.includes('Liquid') || node.name.includes('Sphere')) {
                             node.material.transparent = false;
                             node.material.opacity = 1.0;
                             node.material.depthWrite = true;
                             node.material.renderOrder = 1;
                             if (node.material.transmission !== undefined) node.material.transmission = 0;
                             node.material.needsUpdate = true; 
                         } else if (node.material.transparent || node.material.opacity < 1.0) {
                             node.material.depthWrite = false;
                             node.material.renderOrder = 2;
                             node.material.needsUpdate = true;
                         }
                     }
                 });
                 const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
                 if (pinkLiquid) pinkLiquid.visible = false; 
             }
          });
      });

      // 2. SCANNING LOGIC
      targetEntity.addEventListener('targetFound', () => {
          isTargetVisible = true;
          
          if (!activeExperience) {
              // Show Menu if no choice made yet
              arMenu.classList.add('visible');
          } else if (activeExperience === '3d') {
              // User returns to paper while 3D is active
              targetWrapper.setAttribute('visible', true);
              hudWrapper.setAttribute('visible', false);
          } else if (activeExperience === 'video') {
              // User returns to paper while Video is active
              arVideo.setAttribute('visible', true);
              vidAsset.play();
          }
      });

      targetEntity.addEventListener('targetLost', () => {
          isTargetVisible = false;
          arMenu.classList.remove('visible'); // Hide menu if they look away
          
          if (activeExperience === '3d') {
              // Sticky AR: Swap to HUD
              targetWrapper.setAttribute('visible', false);
              hudWrapper.setAttribute('visible', true);
          } else if (activeExperience === 'video') {
              // Pause video if target is lost
              arVideo.setAttribute('visible', false);
              vidAsset.pause();
          }
      });

      // 3. UI BUTTON CLICKS
      btn3D.addEventListener('click', () => {
          activeExperience = '3d';
          arMenu.classList.remove('visible');
          backBtn.classList.add('visible');
          
          if (isTargetVisible) {
              targetWrapper.setAttribute('visible', true);
              hudWrapper.setAttribute('visible', false);
          } else {
              targetWrapper.setAttribute('visible', false);
              hudWrapper.setAttribute('visible', true);
          }
      });

      btnVideo.addEventListener('click', () => {
          activeExperience = 'video';
          arMenu.classList.remove('visible');
          backBtn.classList.add('visible');
          
          if (isTargetVisible) {
              arVideo.setAttribute('visible', true);
              vidAsset.play();
          }
      });

      backBtn.addEventListener('click', () => {
          activeExperience = null;
          backBtn.classList.remove('visible');
          
          // Hide everything & pause video
          targetWrapper.setAttribute('visible', false);
          hudWrapper.setAttribute('visible', false);
          arVideo.setAttribute('visible', false);
          vidAsset.pause();
          
          // Reset 3D Model drops
          dropCount = 0;
          models.forEach(setup => {
             const mesh = setup.getObject3D('mesh');
             if (mesh) {
                 const clearLiquid = mesh.getObjectByName('Liquid_Clear');
                 const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
                 if (clearLiquid) clearLiquid.visible = true; 
                 if (pinkLiquid) pinkLiquid.visible = false;    
             }
          });

          // Show menu if still looking at paper
          if (isTargetVisible) arMenu.classList.add('visible');
      });

      // 4. TOUCH CONTROLS (Only affects 3D model)
      let isDragging = false;
      let lastX = 0, lastY = 0;
      let initialDist = 0;
      let currentScale = 1; 

      function getDist(touches) {
          let dx = touches[0].clientX - touches[1].clientX;
          let dy = touches[0].clientY - touches[1].clientY;
          return Math.sqrt(dx*dx + dy*dy);
      }

      window.addEventListener('touchstart', (e) => {
          if (activeExperience !== '3d') return; // Ignore if on video
          
          if (e.touches.length === 1 && e.target.tagName !== 'BUTTON') {
              isDragging = true;
              lastX = e.touches[0].clientX;
              lastY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
              isDragging = false;
              initialDist = getDist(e.touches);
          }
      });

      window.addEventListener('touchend', () => { isDragging = false; });

      window.addEventListener('touchmove', (e) => {
          if (activeExperience !== '3d') return;

          if (isDragging && e.touches.length === 1) {
              let deltaX = e.touches[0].clientX - lastX;
              let deltaY = e.touches[0].clientY - lastY;
              [hudWrapper, targetWrapper].forEach(el => {
                  el.object3D.rotation.y += deltaX * 0.01;
                  el.object3D.rotation.x += deltaY * 0.01;
              });
              lastX = e.touches[0].clientX;
              lastY = e.touches[0].clientY;
          } else if (e.touches.length === 2 && initialDist > 0) {
              let currentDist = getDist(e.touches);
              let scaleFactor = currentDist / initialDist;
              let newScale = currentScale * scaleFactor;
              newScale = Math.max(0.5, Math.min(3, newScale)); 
              
              [hudWrapper, targetWrapper].forEach(el => {
                  el.object3D.scale.set(newScale, newScale, newScale);
              });
              currentScale = newScale;
              initialDist = currentDist; 
          }
      });

      // 5. TAP TO ANIMATE (Only for 3D model)
      window.addEventListener('click', (e) => {
        // Ignore clicks on UI buttons or if video is active
        if (activeExperience !== '3d' || isAnimating || e.target.tagName === 'BUTTON') return; 
        
        dropCount++;
        isAnimating = true;

        models.forEach(setup => {
            setup.removeAttribute('animation-mixer');
            setTimeout(() => {
                setup.setAttribute('animation-mixer', 'clip: *; loop: once; crossFadeDuration: 0;');
            }, 10);
        });

        const onAnimationFinish = function() {
          models[0].removeEventListener('animation-finished', onAnimationFinish);
          isAnimating = false; 

          if (dropCount === 7) {
              models.forEach(setup => {
                  const mesh = setup.getObject3D('mesh');
                  if (mesh) {
                      const clearLiquid = mesh.getObjectByName('Liquid_Clear');
                      const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
                      if (clearLiquid) clearLiquid.visible = false; 
                      if (pinkLiquid) pinkLiquid.visible = true;    
                  }
              });
            
              popup.classList.add('visible');
              setTimeout(() => popup.classList.remove('visible'), 4000);
          }
        };

        models[0].addEventListener('animation-finished', onAnimationFinish);
        setTimeout(() => {
            if (isAnimating) {
                isAnimating = false;
                models[0].removeEventListener('animation-finished', onAnimationFinish);
            }
        }, 1500); 
      });
    </script>
  </body>
</html>
