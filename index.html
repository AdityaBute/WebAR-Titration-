<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Titration Final Project</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <script>
      AFRAME.registerComponent('touch-controls', {
        schema: { 
          rotationSpeed: { default: 1 },
          minScale: { default: 0.1 },
          maxScale: { default: 5 }
        },
        init: function () {
          this.ifMouseDown = false;
          this.x_cord = 0;
          this.y_cord = 0;
          this.initialDistance = 0;
          this.initialScale = this.el.object3D.scale.clone();

          document.addEventListener('touchstart', this.OnTouchStart.bind(this));
          document.addEventListener('touchend', this.OnTouchEnd.bind(this));
          document.addEventListener('touchmove', this.OnTouchMove.bind(this));
        },
        OnTouchStart: function (event) { 
          if (event.touches.length === 1) {
            this.ifMouseDown = true; 
            this.x_cord = event.touches[0].clientX; 
            this.y_cord = event.touches[0].clientY; 
          } else if (event.touches.length === 2) {
            this.ifMouseDown = false; // Stop rotating so we can zoom safely
            this.initialDistance = this.getDistance(event.touches);
            this.initialScale = this.el.object3D.scale.clone();
          }
        },
        OnTouchEnd: function () { 
          this.ifMouseDown = false; 
        },
        OnTouchMove: function (event) {
          // ROTATE
          if (this.ifMouseDown && event.touches.length === 1) {
            let temp_x = event.touches[0].clientX - this.x_cord;
            let temp_y = event.touches[0].clientY - this.y_cord;
            this.el.object3D.rotation.y += temp_x * this.data.rotationSpeed / 100;
            this.el.object3D.rotation.x += temp_y * this.data.rotationSpeed / 100;
            this.x_cord = event.touches[0].clientX;
            this.y_cord = event.touches[0].clientY;
          } 
          // ZOOM (Scale)
          else if (event.touches.length === 2) {
            let currentDistance = this.getDistance(event.touches);
            let scaleFactor = currentDistance / this.initialDistance;
            
            let newScaleX = this.initialScale.x * scaleFactor;
            let newScaleY = this.initialScale.y * scaleFactor;
            let newScaleZ = this.initialScale.z * scaleFactor;

            // Prevent it from getting too massive or too microscopic
            newScaleX = Math.max(this.data.minScale, Math.min(this.data.maxScale, newScaleX));
            newScaleY = Math.max(this.data.minScale, Math.min(this.data.maxScale, newScaleY));
            newScaleZ = Math.max(this.data.minScale, Math.min(this.data.maxScale, newScaleZ));

            this.el.object3D.scale.set(newScaleX, newScaleY, newScaleZ);
          }
        },
        getDistance: function(touches) {
          let dx = touches[0].clientX - touches[1].clientX;
          let dy = touches[0].clientY - touches[1].clientY;
          return Math.sqrt(dx * dx + dy * dy);
        }
      });
    </script>
    
    <style>
      .mindar-ui-overlay { pointer-events: none; }
      #debug-ui {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: lime; padding: 10px 20px; border-radius: 8px;
        font-family: monospace; font-size: 16px; z-index: 9999; display: none; pointer-events: none;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div id="debug-ui">System Ready</div>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true, antialias: true, sortObjects: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="lab-kit" src="./assets/titration_final.glb"></a-asset-item>
      </a-assets>

      <a-camera id="ar-camera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity light="type: ambient; intensity: 1.2; color: #ffffff;"></a-entity>
      <a-entity light="type: directional; intensity: 1.5; color: #ffffff;" position="1 2 1"></a-entity>
      <a-entity light="type: directional; intensity: 0.5; color: #e0f7fa;" position="-1 0.5 -1"></a-entity>

      <a-entity id="image-target" mindar-image-target="targetIndex: 0">
        
        <a-entity id="model-wrapper" touch-controls>
            <a-gltf-model id="titration-setup" 
                          src="#lab-kit" 
                          scale="0.5 0.5 0.5" 
                          position="0 -0.5 0">
            </a-gltf-model>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      const target = document.querySelector('#image-target');
      const modelWrapper = document.querySelector('#model-wrapper');
      const camera = document.querySelector('#ar-camera');
      const setup = document.querySelector('#titration-setup');
      const debugUI = document.querySelector('#debug-ui');
      
      let isUnlocked = false;
      let dropCount = 0;
      let isAnimating = false;

      function showDebug(msg) {
          debugUI.style.display = 'block';
          debugUI.innerText = msg;
          setTimeout(() => { debugUI.style.display = 'none'; }, 2000);
      }

      // FEATURE 1: STICKY AR (Lock model to screen after scan)
      target.addEventListener('targetFound', () => {
        if (!isUnlocked) {
          isUnlocked = true;
          // Detach from the target image and glue it directly to the camera
          camera.appendChild(modelWrapper);
          // Push it 2.5 meters straight in front of the lens so it's perfectly visible
          modelWrapper.setAttribute('position', '0 -0.5 -2.5');
          showDebug("Model Locked to Screen!");
        }
      });

      // FEATURE 2: SHADER FIX (Keeps liquids sharp)
      setup.addEventListener('model-loaded', () => {
         const mesh = setup.getObject3D('mesh');
         if (mesh) {
             mesh.traverse((node) => {
                 if (node.isMesh && node.material) {
                     if (node.name.includes('Liquid') || node.name.includes('Sphere')) {
                         node.material.transparent = false;
                         node.material.opacity = 1.0;
                         node.material.depthWrite = true;
                         node.material.renderOrder = 1;
                         if (node.material.transmission !== undefined) node.material.transmission = 0;
                         node.material.needsUpdate = true; 
                     }
                     else if (node.material.transparent || node.material.opacity < 1.0) {
                         node.material.depthWrite = false;
                         node.material.renderOrder = 2;
                         node.material.needsUpdate = true;
                     }
                 }
             });
             const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
             if (pinkLiquid) pinkLiquid.visible = false; 
         }
      });

      // FEATURE 3: TAP TO ANIMATE & COLOR SWAP
      window.addEventListener('click', () => {
        if (isAnimating || !isUnlocked) return; // Wait until scanned and not falling
        
        dropCount++;
        isAnimating = true;

        setup.removeAttribute('animation-mixer');
        setTimeout(() => {
            setup.setAttribute('animation-mixer', 'clip: *; loop: once; crossFadeDuration: 0;');
        }, 10);

        const onAnimationFinish = function() {
          setup.removeEventListener('animation-finished', onAnimationFinish);
          isAnimating = false; 

          if (dropCount === 7) {
            const mesh = setup.getObject3D('mesh');
            if (mesh) {
                const clearLiquid = mesh.getObjectByName('Liquid_Clear');
                const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
                if (clearLiquid) clearLiquid.visible = false; 
                if (pinkLiquid) pinkLiquid.visible = true;    
            }
            
            const alertBox = document.createElement('div');
            alertBox.innerHTML = "Equivalence Point Reached!";
            alertBox.style.cssText = "position:absolute; top:20%; left:50%; transform:translateX(-50%); background:white; padding:15px; border-radius:10px; font-family:sans-serif; font-weight:bold; color:#FF1493; z-index:9999; box-shadow: 0px 4px 6px rgba(0,0,0,0.4); text-align: center;";
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.remove(), 4000);
          }
        };

        setup.addEventListener('animation-finished', onAnimationFinish);
        
        setTimeout(() => {
            if(isAnimating) {
                isAnimating = false;
                setup.removeEventListener('animation-finished', onAnimationFinish);
            }
        }, 1500); 
      });
    </script>
  </body>
</html>
